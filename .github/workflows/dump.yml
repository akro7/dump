name: 8BOOLPOOL Library Dumper

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dump-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Verify Library File
      run: |
        if [ -f "libgame.so" ]; then
          echo "Success: libgame.so found!"
        else
          echo "Warning: libgame.so not found in root, searching folders..."
        fi

    - name: Archive and Create Dump
      run: |
        mkdir -p dump_output
        find . -name "libgame.so" -exec cp {} dump_output/ \;
        cd dump_output
        zip -r ../libgame_dump.zip .
        cd ..

    - name: Release Library Dump
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0.${{ github.run_number }}"
        name: "8BOOLPOOL Dump v1.0.${{ github.run_number }}"
        body: |
          Automated dump for 8BOOLPOOL game library.
          - File: libgame.so (74MB)
          - Date: ${{ github.event.head_commit.timestamp }}
        files: libgame_dump.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
